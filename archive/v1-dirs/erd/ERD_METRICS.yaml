# ─────────────────────────────────────────────────────────────────────────────────
# SYNC QUERIES (Reference — sales.* schema)
# ─────────────────────────────────────────────────────────────────────────────────
queries:
  spine_total: |
    SELECT COUNT(*) FROM sales.sales_state;

  spine_by_phase: |
    SELECT current_phase, COUNT(*)
    FROM sales.sales_state
    GROUP BY current_phase;

  factfinder_total: |
    SELECT COUNT(*) FROM sales.sales_factfinder;

  insurance_total: |
    SELECT COUNT(*) FROM sales.sales_insurance;

  systems_total: |
    SELECT COUNT(*) FROM sales.sales_systems;

  quotes_total: |
    SELECT COUNT(*) FROM sales.sales_quotes;

  errors_all: |
    SELECT 'factfinder' AS subhub, COUNT(*) FROM sales.sales_factfinder_errors
    UNION ALL
    SELECT 'insurance', COUNT(*) FROM sales.sales_insurance_errors
    UNION ALL
    SELECT 'systems', COUNT(*) FROM sales.sales_systems_errors
    UNION ALL
    SELECT 'quotes', COUNT(*) FROM sales.sales_quotes_errors;

