# ═══════════════════════════════════════════════════════════════════════════════
# COLUMN REGISTRY — Canonical Schema Spine
# ═══════════════════════════════════════════════════════════════════════════════
# Authority: imo-creator (Inherited)
# Status: ACTIVE — Every hub with data/ branch MUST have a column_registry.yml
# Version: 1.0.0
# Purpose: Single source of truth for all table schemas in this hub
# ═══════════════════════════════════════════════════════════════════════════════
#
# RULES:
#   1. This file is the CANONICAL entry point for all data schema
#   2. Generated files (TypeScript types, Zod schemas) are PROJECTIONS of this file
#   3. Generated files are NEVER hand-edited
#   4. After updating this file, run: ./scripts/codegen-generate.sh
#   5. Pre-commit hook enforces sync between this file and generated output
#   6. Each table declares owning_subhub per ARCHITECTURE.md OWN-10
#   7. Each sub-hub has exactly 1 CANONICAL + 1 ERROR table (OWN-10a, OWN-10b)
#   8. Additional table types require ADR justification (OWN-10c)
#
# D1 TYPE MAPPING (BAR-100):
#   Types declared here target Neon vault (PostgreSQL). CF D1 (SQLite) equivalents:
#     BIGSERIAL  -> INTEGER AUTOINCREMENT
#     UUID       -> TEXT (app-generated UUIDs)
#     TIMESTAMPTZ -> TEXT (ISO-8601 strings)
#     JSONB      -> TEXT (JSON validation in application layer)
#     NUMERIC    -> REAL
#     BOOLEAN    -> INTEGER (0/1)
#
# READING ORDER:
#   OSAM → column_registry.yml → generated files
#
# ═══════════════════════════════════════════════════════════════════════════════

version: "1.1.0"
last_updated: "2026-03-11"

# ═══════════════════════════════════════════════════════════════════════════════
# HUB IDENTITY
# ═══════════════════════════════════════════════════════════════════════════════

hub:
  hub_id: "HUB-SALES-NAV-20260130"
  hub_name: "sales-navigator"
  universal_join_key: "sales_id"
  universal_join_key_type: "UUID"

# ═══════════════════════════════════════════════════════════════════════════════
# SPINE TABLE
# ═══════════════════════════════════════════════════════════════════════════════

spine_table:
  schema: "sales"
  name: "sales_state"
  description: "Phase router — authoritative source of sales process identity, gates sub-hub access"
  owning_subhub: null  # Spine is hub-level, not sub-hub-level
  leaf_type: "CANONICAL"
  source_of_truth: true
  row_identity_strategy: "UUID"
  columns:
    - name: "sales_id"
      type: "UUID"
      nullable: false
      description: "Universal join key — minted at intake, propagated to all sub-hub tables"
      semantic_role: "identifier"
      format: "UUID"
      default: "gen_random_uuid()"
    - name: "legal_name"
      type: "TEXT"
      nullable: false
      description: "Company legal name — mirrors cl.company_identity.company_name"
      semantic_role: "attribute"
      format: "STRING"
    - name: "domicile_state"
      type: "TEXT"
      nullable: true
      description: "State of domicile for the prospect company"
      semantic_role: "attribute"
      format: "STRING"
    - name: "current_phase"
      type: "TEXT"
      nullable: false
      description: "Active sub-hub gate — one of factfinder, insurance, systems, quotes"
      semantic_role: "attribute"
      format: "ENUM"
      default: "'factfinder'"
    - name: "status"
      type: "TEXT"
      nullable: false
      description: "Sales process status — active, paused, closed_won, closed_lost"
      semantic_role: "attribute"
      format: "ENUM"
      default: "'active'"
    - name: "source"
      type: "TEXT"
      nullable: true
      description: "Origin of the sales record — manual_sales_bootstrap, crm_intake, etc."
      semantic_role: "attribute"
      format: "STRING"
    - name: "version"
      type: "INTEGER"
      nullable: false
      description: "Optimistic concurrency version counter"
      semantic_role: "attribute"
      format: "INTEGER"
      default: "1"
    - name: "created_at"
      type: "TIMESTAMPTZ"
      nullable: false
      description: "Process inception timestamp"
      semantic_role: "attribute"
      format: "ISO-8601"
    - name: "updated_at"
      type: "TIMESTAMPTZ"
      nullable: false
      description: "Last phase transition timestamp — auto-updated by trigger"
      semantic_role: "attribute"
      format: "ISO-8601"

